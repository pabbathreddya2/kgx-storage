---
# AWS Load Balancer Controller Ingress for kgx-storage.rtx.ai
# Requires AWS Load Balancer Controller to be installed in your EKS cluster
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kgx-storage
  namespace: kgx-storage
  labels:
    app: kgx-storage
  annotations:
    # ALB Configuration
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    
    # SSL/TLS Configuration
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/CERT_ID"  # Replace with your ACM certificate ARN
    
    # Health Check
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '10'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'
    
    # Performance
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=120
    
    # Tags (optional)
    alb.ingress.kubernetes.io/tags: Environment=production,Application=kgx-storage
spec:
  rules:
  - host: kgx-storage.rtx.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kgx-storage
            port:
              number: 80
