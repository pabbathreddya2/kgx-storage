---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kgx-storage-config
  namespace: kgx-storage
  labels:
    app: kgx-storage
data:
  # S3 Configuration
  BUCKET_NAME: "kgx-translator-ingests"
  AWS_REGION: "us-east-1"  # Update with your S3 bucket region
  
  # Gunicorn Configuration
  GUNICORN_WORKERS: "4"
  GUNICORN_THREADS: "2"
  GUNICORN_TIMEOUT: "120"
  PORT: "5000"
  
  # Application Configuration
  FLASK_ENV: "production"
  PYTHONUNBUFFERED: "1"
