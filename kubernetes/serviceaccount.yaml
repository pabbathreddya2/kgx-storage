---
# ServiceAccount with IAM role annotation for S3 access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kgx-storage-sa
  namespace: kgx-storage
  labels:
    app: kgx-storage
  annotations:
    # Replace with your IAM role ARN created for S3 access
    # Example: arn:aws:iam::123456789012:role/kgx-storage-s3-access
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/kgx-storage-s3-role"
